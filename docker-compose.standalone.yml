version: '3.8'

services:
  # OIDC Auth Proxy
  oidc-auth:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: traefik-oidc-auth
    ports:
      - "8080:8080"  # Main proxy port
      - "9090:9090"  # Metrics port
    environment:
      # Standalone configuration
      - TRAEFIK_AUTH_CONFIG_FILE=/config/config.json
      - TRAEFIK_AUTH_LISTEN_ADDR=:8080
      - TRAEFIK_AUTH_METRICS_ADDR=:9090
      - TRAEFIK_AUTH_UPSTREAM_URL=http://whoami:80
      # OIDC configuration
      - LOG_LEVEL=debug
      - OIDC_SECRET=12345678901234567890123456789012  # 32 characters
      - OIDC_PROVIDER_URL=http://keycloak:8080/realms/master
      - OIDC_CLIENT_ID=traefik-oidc-auth
      - OIDC_CLIENT_SECRET=test-client-secret
      - OIDC_CALLBACK_URI=/oauth2/callback
      - OIDC_USE_PKCE=true
      - OIDC_INSECURE_SKIP_VERIFY=true  # For local development only
    depends_on:
      - whoami
      - keycloak
    networks:
      - oidc-network

  # Sample upstream service
  whoami:
    image: traefik/whoami
    container_name: whoami
    networks:
      - oidc-network

  # Keycloak for OIDC provider
  keycloak:
    image: quay.io/keycloak/keycloak:26.2.5
    container_name: keycloak
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_HOSTNAME_STRICT=false
      - KC_HTTP_ENABLED=true
    command:
      - start-dev
    ports:
      - "8000:8080"
    networks:
      - oidc-network

  # Optional: Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9091:9090"
    networks:
      - oidc-network

networks:
  oidc-network:
    driver: bridge
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.2.5
    restart: unless-stopped
    ports:
      - "8000:8080"
    environment:
      KC_HOSTNAME: "http://localhost:8000"
      KC_DB: dev-mem
      KC_HEALTH_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - "./test-realm.json:/opt/keycloak/data/import/test-realm.json:ro"
    command: ['start-dev', '--import-realm']
    healthcheck:
      test: ["CMD-SHELL", "timeout 10s bash -c ':> /dev/tcp/localhost/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  traefik:
    image: "traefik:v3.3.2"
    depends_on:
      keycloak:
        condition: service_healthy
    ports:
      - "9080:80"
      - "8080:8080"
    extra_hosts:
      - "localhost:172.17.0.1" # To make OIDC discovery work correctly
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "../../../workspaces/configs/traefik-config.yml:/etc/traefik/traefik.yml:ro"
      - "../../..:/plugins-local/src/github.com/sevensolutions/traefik-oidc-auth:ro"
      - "../../.http.yml:/etc/traefik/configs/http.yml:ro" # Will be generated by tests
    environment:
      PROVIDER_URL: http://keycloak:8080/realms/test
      CLIENT_ID: traefik
      CLIENT_SECRET: test-secret

  whoami:
    image: "traefik/whoami:latest"
    ports:
      - "8081:80"
